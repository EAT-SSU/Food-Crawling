AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Food Scrapper Serverless Application

Globals:
  Function:
    Runtime: python3.11
    Architectures: [arm64]
    Timeout: 300
    MemorySize: 512
    Environment:
      Variables:
        GPT_API_KEY: !Ref GPTApiKey
        SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl
        API_BASE_URL: !Ref ApiBaseUrl
        DEV_API_BASE_URL: !Ref DevApiBaseUrl

Parameters:
  GPTApiKey:
    Type: String
    NoEcho: true
  SlackWebhookUrl:
    Type: String
    NoEcho: true
  ApiBaseUrl:
    Type: String
  DevApiBaseUrl:
    Type: String

Resources:
  # Python 의존성 레이어
  PythonRequirementsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "${AWS::StackName}-python-requirements"
      Description: Python requirements layer
      ContentUri: ./
      CompatibleRuntimes:
        - python3.11
      CompatibleArchitectures:
        - arm64
    Metadata:
      BuildMethod: python3.11

  # === Scraping Functions ===
  # 하루짜리 스크래핑 함수들 (백업용)
  DodamScrapingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: functions.lambda_handlers.scraping.dodam.lambda_handler
      Layers:
        - !Ref PythonRequirementsLayer

  HaksikScrapingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: functions.lambda_handlers.scraping.haksik.lambda_handler
      Layers:
        - !Ref PythonRequirementsLayer

  FacultyScrapingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: functions.lambda_handlers.scraping.faculty.lambda_handler
      Layers:
        - !Ref PythonRequirementsLayer

  DormitoryScrapingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: functions.lambda_handlers.scraping.dormitory.lambda_handler
      Layers:
        - !Ref PythonRequirementsLayer

  # === Scheduling Functions ===
  # 주간 스케줄링 함수들 (메인)
  DodamSchedulingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: functions.lambda_handlers.scheduling.dodam.lambda_handler
      Layers:
        - !Ref PythonRequirementsLayer
      Events:
        # 매주 일요일 오후 4시에 자동 실행 (KST 기준으로는 일요일 07시 UTC)
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 7 ? * SUN *)
            Input: |
              {
                "trigger": "eventbridge",
                "delayed_schedule": false
              }

  HaksikSchedulingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: functions.lambda_handlers.scheduling.haksik.lambda_handler
      Layers:
        - !Ref PythonRequirementsLayer
      Events:
        # 매주 일요일 오후 4시에 자동 실행
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 7 ? * SUN *)
            Input: |
              {
                "trigger": "eventbridge",
                "delayed_schedule": false
              }

  FacultySchedulingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: functions.lambda_handlers.scheduling.faculty.lambda_handler
      Layers:
        - !Ref PythonRequirementsLayer
      Events:
        # 매주 일요일 오후 4시에 자동 실행
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 7 ? * SUN *)
            Input: |
              {
                "trigger": "eventbridge",
                "delayed_schedule": false
              }

  DormitorySchedulingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: functions.lambda_handlers.scheduling.dormitory.lambda_handler
      Layers:
        - !Ref PythonRequirementsLayer

  NotifyFailureFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: functions.lambda_handlers.notify_failure.lambda_handler
      Layers:
        - !Ref PythonRequirementsLayer

  # === Lambda Log Groups ===
  DodamScrapingFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DependsOn: DodamScrapingFunction
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [W3005]
    Properties:
      LogGroupName: !Sub "/aws/lambda/${DodamScrapingFunction}"
      RetentionInDays: 30

  HaksikScrapingFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DependsOn: HaksikScrapingFunction
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [W3005]
    Properties:
      LogGroupName: !Sub "/aws/lambda/${HaksikScrapingFunction}"
      RetentionInDays: 30

  FacultyScrapingFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DependsOn: FacultyScrapingFunction
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [W3005]
    Properties:
      LogGroupName: !Sub "/aws/lambda/${FacultyScrapingFunction}"
      RetentionInDays: 30

  DormitoryScrapingFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DependsOn: DormitoryScrapingFunction
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [W3005]
    Properties:
      LogGroupName: !Sub "/aws/lambda/${DormitoryScrapingFunction}"
      RetentionInDays: 30

  DodamSchedulingFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DependsOn: DodamSchedulingFunction
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [W3005]
    Properties:
      LogGroupName: !Sub "/aws/lambda/${DodamSchedulingFunction}"
      RetentionInDays: 30

  HaksikSchedulingFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DependsOn: HaksikSchedulingFunction
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [W3005]
    Properties:
      LogGroupName: !Sub "/aws/lambda/${HaksikSchedulingFunction}"
      RetentionInDays: 30

  FacultySchedulingFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DependsOn: FacultySchedulingFunction
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [W3005]
    Properties:
      LogGroupName: !Sub "/aws/lambda/${FacultySchedulingFunction}"
      RetentionInDays: 30

  DormitorySchedulingFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DependsOn: DormitorySchedulingFunction
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [W3005]
    Properties:
      LogGroupName: !Sub "/aws/lambda/${DormitorySchedulingFunction}"
      RetentionInDays: 30

  NotifyFailureFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DependsOn: NotifyFailureFunction
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Metadata:
      cfn-lint:
        config:
          ignore_checks: [W3005]
    Properties:
      LogGroupName: !Sub "/aws/lambda/${NotifyFailureFunction}"
      RetentionInDays: 30

  DormitoryRetryStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      DefinitionUri: statemachine/dormitory-retry-workflow.asl.json
      DefinitionSubstitutions:
        DormitorySchedulingFunctionArn: !GetAtt DormitorySchedulingFunction.Arn
        NotifyFailureFunctionArn: !GetAtt NotifyFailureFunction.Arn
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref DormitorySchedulingFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref NotifyFailureFunction
      Events:
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 23 ? * SUN *)
