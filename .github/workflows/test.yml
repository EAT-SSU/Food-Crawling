name: test

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run deterministic tests
        run: >-
          uv run pytest
          tests/test_clients.py
          tests/test_dependencies.py
          tests/test_time_slot_strategy.py
          tests/test_utils.py
          tests/test_observability.py
          tests/test_exception_sanitization.py
          tests/test_template_contract.py
          tests/test_slack_client.py
          tests/test_source_classification.py
          tests/test_client_observability.py
          tests/test_scheduling_outcomes.py
          tests/integration/test_scheduling_service_integration.py
          tests/test_lambda_handlers.py
          tests/test_notify_failure.py
          tests/test_state_machine_contract.py
          -q
